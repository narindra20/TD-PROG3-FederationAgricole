openapi: 3.0.3

info:
  title: Federation Agricole API
  version: 2.0.0

servers:
  - url: http://localhost:8080

paths:

  # MEMBRE
  /membres:
    get:
      summary: Liste des membres
      responses:
        200:
          description: OK
    post:
      summary: Créer un membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMembreDTO'
      responses:
        201:
          description: Créé

  # COLLECTIVITE
  /collectivites:
    get:
      summary: Liste des collectivités
      responses:
        200:
          description: OK
    post:
      summary: Créer une collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectiviteDTO'
      responses:
        201:
          description: Créée
        400:
          description: Conditions non respectées

  # ADHESION
  /adhesions:
    post:
      summary: Ajouter un membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdhesionDTO'
      responses:
        201:
          description: Créée
        400:
          description: Conditions invalides

  /adhesions/valider:
    post:
      summary: Valider adhésion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdhesionDTO'
      responses:
        200:
          description: Résultat

  # COTISATION
  /cotisations:
    get:
      summary: Liste des cotisations
      responses:
        200:
          description: OK
    post:
      summary: Ajouter une cotisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCotisationDTO'
      responses:
        201:
          description: Créée

  # COMPTES
  /comptes:
    get:
      summary: Liste des comptes
      responses:
        200:
          description: OK
    post:
      summary: Créer un compte
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompteDTO'
      responses:
        201:
          description: Créé

  # ACTIVITE
  /activites:
    get:
      summary: Liste des activités
      responses:
        200:
          description: OK
    post:
      summary: Créer une activité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActiviteDTO'
      responses:
        201:
          description: Créée

  # PRESENCE
  /presences:
    post:
      summary: Enregistrer présence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresenceDTO'
      responses:
        201:
          description: Enregistrée

  # MANDAT
  /mandats:
    post:
      summary: Créer mandat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMandatDTO'
      responses:
        201:
          description: Créé

  /mandats/postes:
    post:
      summary: Attribution postes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMandatPosteDTO'
      responses:
        201:
          description: Attribué

  # STATS COLLECTIVITE
  /stats/collectivite/{id}:
    get:
      summary: Statistiques collectivité
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatCollectivite'

  # STATS FEDERATION
  /stats/federation:
    get:
      summary: Statistiques fédération
      parameters:
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatFederation'

components:

  schemas:

    CreateMembreDTO:
      type: object
      properties:
        nom: { type: string }
        prenom: { type: string }
        dateNaissance: { type: string, format: date }
        genre: { type: string }
        adresse: { type: string }
        telephone: { type: string }
        email: { type: string }
        metier: { type: string }

    Membre:
      allOf:
        - $ref: '#/components/schemas/CreateMembreDTO'
      properties:
        id: { type: integer }

    CreateCollectiviteDTO:
      type: object
      properties:
        nom: { type: string }
        numero: { type: integer }
        dateCreation: { type: string, format: date }
        idVille: { type: integer }
        idDomaine: { type: integer }
        idFederation: { type: integer }

    Collectivite:
      allOf:
        - $ref: '#/components/schemas/CreateCollectiviteDTO'
      properties:
        id: { type: integer }

    Parrain:
      type: object
      properties:
        idMembre: { type: integer }
        relation: { type: string }

    CreateAdhesionDTO:
      type: object
      required:
        - idMembre
        - idCollectivite
        - parrains
        - montantAdhesion
        - montantCotisation
      properties:
        idMembre: { type: integer }
        idCollectivite: { type: integer }
        dateEntree: { type: string, format: date }
        poste: { type: string }
        parrains:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Parrain'
        montantAdhesion: { type: number }
        montantCotisation: { type: number }

    CreateCotisationDTO:
      type: object
      properties:
        idMembre: { type: integer }
        idCollectivite: { type: integer }
        montant: { type: number }
        datePaiement: { type: string, format: date }
        mode: { type: string }
        type: { type: string }

    Cotisation:
      allOf:
        - $ref: '#/components/schemas/CreateCotisationDTO'
      properties:
        id: { type: integer }

    CreateCompteDTO:
      type: object
      properties:
        type: { type: string }
        solde: { type: number }
        idCollectivite: { type: integer }
        idFederation: { type: integer }

    CompteBancaireDetails:
      type: object
      properties:
        banque:
          type: string
          enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES, BAOBAB, SIPEM]
        numeroCompte: { type: string }

    CompteMobileMoneyDetails:
      type: object
      properties:
        operateur:
          type: string
          enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]
        telephone: { type: string }

    Compte:
      allOf:
        - $ref: '#/components/schemas/CreateCompteDTO'
      properties:
        id: { type: integer }
        detailsBancaire:
          $ref: '#/components/schemas/CompteBancaireDetails'
        detailsMobile:
          $ref: '#/components/schemas/CompteMobileMoneyDetails'

    CreateActiviteDTO:
      type: object
      properties:
        titre: { type: string }
        type:
          type: string
          enum: [AG_MENSUELLE, FORMATION_JUNIOR, EXCEPTIONNELLE, FEDERATION]
        cible:
          type: string
          enum: [TOUS, JUNIORS, SPECIFIQUE]
        dateActivite: { type: string, format: date }
        obligatoire: { type: boolean }
        idCollectivite: { type: integer }
        idFederation: { type: integer }

    Activite:
      allOf:
        - $ref: '#/components/schemas/CreateActiviteDTO'
      properties:
        id: { type: integer }

    CreatePresenceDTO:
      type: object
      properties:
        idMembre: { type: integer }
        idActivite: { type: integer }
        present: { type: boolean }
        excuse: { type: boolean }
        externe: { type: boolean }

    CreateMandatDTO:
      type: object
      properties:
        annee: { type: integer }
        duree: { type: integer }

    CreateMandatPosteDTO:
      type: object
      properties:
        idMandat: { type: integer }
        idMembre: { type: integer }
        idCollectivite: { type: integer }
        poste: { type: string }

    StatCollectivite:
      type: object
      properties:
        nbMembres: { type: integer }
        tauxAssiduite: { type: number }
        totalCotisations: { type: number }
        impayes: { type: number }
        detailsMembres:
          type: array
          items:
            type: object
            properties:
              idMembre: { type: integer }
              tauxAssiduite: { type: number }
              totalVerse: { type: number }
              impaye: { type: number }

    StatFederation:
      type: object
      properties:
        collectivites:
          type: array
          items:
            type: object
            properties:
              idCollectivite: { type: integer }
              tauxAssiduite: { type: number }
              pourcentageCotisationAJour: { type: number }
              nouveauxAdherents: { type: integer }